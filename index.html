<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Crédito | BBVA</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="top-nav">
        <div class="nav-container">
            <img src="assets/bbva.png" alt="Logo BBVA" class="logo">
            <span class="nav-title">Simulador de Préstamos</span>
        </div>
    </header>

    <div class="container">

        <div class="print-header">
            <img src="assets/logo-bbva.png" alt="Logo BBVA" class="print-logo">
            <h2>Simulación de Crédito Personal</h2>
            <hr>
        </div>

        <form id="credit-form">
            <label for="nombre">Nombre del Cliente:</label>
            <input type="text" id="nombre" placeholder="Ej. Juan Pérez" required>

            <label for="monto">Monto del Crédito Solicitado ($):</label>
            <input type="number" id="monto" value="150000" required>
            
            <label for="tasa">Tasa de Interés Anual Ordinaria (%):</label>
            <input type="number" id="tasa" value="34" step="0.1" required>
            
            <label for="plazo">Plazo del Financiamiento (Meses):</label>
            <select id="plazo">
                <option value="12">12 meses</option>
                <option value="24">24 meses</option>
                <option value="36">36 meses</option>
                <option value="48" selected>48 meses</option>
            </select>

            <div class="form-actions" style="grid-column: span 2; display: flex; gap: 15px; margin-top: 10px;">
                <button type="button" id="btn-calcular" class="btn-primary">Calcular Tabla</button>
                <button type="button" id="btn-pdf" class="btn-secondary">Exportar a PDF</button>
            </div>
        </form>

        <table id="tabla-amortizacion">
            <thead>
                <tr>
                    <th>Mes</th>
                    <th>Amortización</th>
                    <th>Interés</th>
                    <th>IVA (16%)</th>
                    <th>Pago Mensual</th>
                    <th>Saldo Insoluto</th>
                </tr>
            </thead>
            <tbody>
            
            </tbody>
        </table>
    </div>

    <script src="script.js"></script>
</body>
</html>
